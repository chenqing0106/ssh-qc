# Deploy to VPS via GitHub Actions
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }}" \
            --filter=':- .gitignore' \
            --exclude='.git/' \
            --exclude='memory/' \
            --exclude='.ssh/' \
            --delete --delete-excluded \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/ssh-portfolio/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ~/ssh-portfolio && bash deploy.sh"
